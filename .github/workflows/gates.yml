name: gates
# Actionable audit trail: every push/PR must pass the optimizer's own gates.
# A change that breaks efficacy, fidelity, truthfulness, or the ledger fails the build.
# All checks are deterministic on committed data (no model calls, no secrets, no network):
# the judge verdicts are pre-computed and committed; full-book fidelity is NOT-RUN (book gitignored).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the co-mutation guard can diff against main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: preflight (repo integrity + readiness)
        run: python3 engine/preflight.py cartridges/ousterhout

      - name: pre-ship gate (SHIP/BLOCK)
        run: python3 engine/gate.py cartridges/ousterhout

      - name: gate negative control (must BLOCK a degraded skill)
        run: python3 engine/gate.py --selftest cartridges/ousterhout

      - name: gate self-durability (--selftest must catch a neutered gate)
        run: python3 engine/gate_durability.py cartridges/ousterhout

      - name: craft axis (skill file codifies the craft; HARD checks block)
        run: python3 engine/craft.py cartridges/ousterhout

      - name: craft negative control (--selftest must catch a degraded skill)
        run: python3 engine/craft.py cartridges/ousterhout --selftest

      - name: co-mutation guard selftest (governance logic is non-vacuous)
        run: python3 engine/comutation_guard.py cartridges/ousterhout --selftest

      - name: co-mutation guard (skill and bar must not co-mutate un-ratified)
        run: |
          git fetch origin main --depth=1 || true
          python3 engine/comutation_guard.py cartridges/ousterhout --range origin/main...HEAD

      - name: truthfulness gate (RG + T1 + T2 + T4, fail-closed)
        run: python3 cartridges/ousterhout/truthfulness/gate.py cartridges/ousterhout/truthfulness

      - name: judge calibration (TPR/TNR >= 0.85)
        run: python3 cartridges/ousterhout/validation/calibrate.py
